name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Detect Android project and Gradle command
        id: project
        shell: bash
        run: |
          set -euo pipefail

          GRADLEW_PATH="$(find . -maxdepth 4 -type f -name gradlew | head -n 1 || true)"

          if [ -n "$GRADLEW_PATH" ]; then
            PROJECT_DIR="$(dirname "$GRADLEW_PATH")"
            chmod +x "$GRADLEW_PATH"
            GRADLE_COMMAND="./gradlew"
            echo "Gradle wrapper ditemukan di: $GRADLEW_PATH"
          else
            SETTINGS_PATH="$(find . -maxdepth 4 \( -name settings.gradle -o -name settings.gradle.kts \) | head -n 1 || true)"

            if [ -z "$SETTINGS_PATH" ]; then
              echo "ERROR: settings.gradle/settings.gradle.kts tidak ditemukan."
              echo "Pastikan repository berisi project Android yang valid."
              exit 1
            fi

            PROJECT_DIR="$(dirname "$SETTINGS_PATH")"
            GRADLE_COMMAND="gradle"
            echo "gradlew tidak ditemukan. Menggunakan Gradle dari GitHub Actions."
            echo "Android project ditemukan di: $PROJECT_DIR"
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "gradle_command=$GRADLE_COMMAND" >> "$GITHUB_OUTPUT"

      - name: Accept Android SDK licenses
        shell: bash
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Build Debug APK
        shell: bash
        working-directory: ${{ steps.project.outputs.project_dir }}
        run: ${{ steps.project.outputs.gradle_command }} clean assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WarungDataPOS-Debug
          path: |
            **/build/outputs/apk/debug/*.apk
            **/outputs/apk/debug/*.apk
          if-no-files-found: error
